<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas JS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow p-4" style="max-width: 400px; width: 100%;">
            <h2 class="text-center mb-4">Conversor de Moedas</h2>
            
            <div class="mb-3">
                <label class="form-label">Valor:</label>
                <input type="number" id="amount" class="form-control" placeholder="Digite o valor" value="1">
            </div>

            <div class="row mb-3">
                <div class="col">
                    <label class="form-label">De:</label>
                    <select id="fromCurrency" class="form-select">
                        <option value="USD" selected>USD - Dólar</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="BRL">BRL - Real</option>
                    </select>
                </div>
                <div class="col">
                    <label class="form-label">Para:</label>
                    <select id="toCurrency" class="form-select">
                        <option value="BRL" selected>BRL - Real</option>
                        <option value="USD">USD - Dólar</option>
                        <option value="EUR">EUR - Euro</option>
                    </select>
                </div>
            </div>

            <button id="convertBtn" class="btn btn-primary w-100 mb-3">Converter</button>

            <div class="alert alert-success text-center mb-0">
                <h4 id="result">R$ 0,00</h4>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
